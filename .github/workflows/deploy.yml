name: Windows Auto Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        shell: powershell
        run: |
          $v = & pnpm --version 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "pnpm not found, installing..."
            npm install -g pnpm@9
          } else {
            Write-Host "pnpm $v already installed"
          }

      - name: Check environment
        shell: powershell
        run: |
          Write-Host "Node: $(node --version)"
          Write-Host "pnpm: $(pnpm --version)"
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Write-Host "dist exists: $(Test-Path 'apps\api\dist')"
          Write-Host "env exists : $(Test-Path 'apps\api\.env')"

      - name: Run deploy.bat
        shell: cmd
        run: |
          cd /d %GITHUB_WORKSPACE%
          call deploy.bat

      - name: Show logs on failure
        if: failure()
        shell: powershell
        run: |
          Write-Host "====== api.log ======"
          Get-Content "logs\api.log" -ErrorAction SilentlyContinue | Select-Object -Last 80
          Write-Host "====== admin.log ======"
          Get-Content "logs\admin.log" -ErrorAction SilentlyContinue | Select-Object -Last 20
