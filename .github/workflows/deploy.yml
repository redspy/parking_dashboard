name: Windows Auto Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        shell: cmd
        run: |
          corepack enable

      - name: Run deploy.bat from workspace
        shell: cmd
        run: |
          echo Workspace: %GITHUB_WORKSPACE%
          if not exist "%GITHUB_WORKSPACE%\deploy.bat" (
            echo ERROR: deploy.bat not found in workspace
            exit /b 1
          )
          cd /d %GITHUB_WORKSPACE%
          call "%GITHUB_WORKSPACE%\deploy.bat"
